name: BoatAI Scheduler Monitor

on:
  schedule:
    # レース時間帯 (JST 10:00-21:00 = UTC 01:00-12:00) に1時間ごと
    - cron: '0 1-12 * * *'
  workflow_dispatch: # 手動実行用

jobs:
  check-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Check scheduler health
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          pip install psycopg2-binary > /dev/null 2>&1

          python3 << 'PYEOF'
          import os, json, urllib.request, psycopg2, psycopg2.extras
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          now_jst = datetime.now(JST)
          hour_jst = now_jst.hour

          # レース時間帯外 (10時前, 21時以降) はスキップ
          if hour_jst < 10 or hour_jst >= 21:
              print(f"レース時間帯外 ({hour_jst}時JST) - スキップ")
              exit(0)

          db_url = os.environ['DATABASE_URL']
          webhook_url = os.environ['TEAMS_WEBHOOK_URL']

          alerts = []

          try:
              conn = psycopg2.connect(db_url, cursor_factory=psycopg2.extras.RealDictCursor)
              cur = conn.cursor()

              # 1. 直近2時間のベット件数
              cur.execute("""
                  SELECT COUNT(*) as cnt FROM bets
                  WHERE created_at >= NOW() - INTERVAL '2 hours'
              """)
              recent_bets = cur.fetchone()['cnt']

              # 2. scheduler_health 最終更新
              cur.execute("""
                  SELECT status, detail, created_at FROM scheduler_health
                  ORDER BY created_at DESC LIMIT 1
              """)
              health = cur.fetchone()

              # 3. 今日の合計ベット
              cur.execute("""
                  SELECT COUNT(*) as cnt, COALESCE(SUM(amount), 0) as total
                  FROM bets WHERE created_at >= CURRENT_DATE
              """)
              today = cur.fetchone()

              conn.close()

              # 判定: 10時以降で直近2時間ベット0件 → 異常
              if hour_jst >= 11 and recent_bets == 0:
                  alerts.append(f"直近2時間のベット: 0件")

              # scheduler_health が3時間以上更新なし
              if health:
                  last_update = health['created_at']
                  if last_update.tzinfo is None:
                      last_update = last_update.replace(tzinfo=timezone.utc)
                  hours_ago = (datetime.now(timezone.utc) - last_update).total_seconds() / 3600
                  if hours_ago > 3:
                      alerts.append(f"scheduler_health: {hours_ago:.1f}時間前から更新なし (最終: {health['status']})")

          except Exception as e:
              alerts.append(f"DB接続エラー: {str(e)[:200]}")

          if alerts:
              msg = f"**[BoatAI] スケジューラー異常検知** ({now_jst.strftime('%m/%d %H:%M')} JST)\n\n"
              for a in alerts:
                  msg += f"- {a}\n"
              msg += f"\n本日のベット: {today['cnt']}件 / {int(today['total']):,}円"
              msg += f"\n\n[Railway Dashboard](https://railway.app) を確認してください"

              data = json.dumps({"text": msg}).encode('utf-8')
              req = urllib.request.Request(
                  webhook_url, data=data,
                  headers={'Content-Type': 'application/json; charset=utf-8'}
              )
              urllib.request.urlopen(req)
              print(f"ALERT sent: {alerts}")
          else:
              print(f"OK: {now_jst.strftime('%H:%M')} JST - bets(2h)={recent_bets}, today={today['cnt']}件")

          PYEOF
